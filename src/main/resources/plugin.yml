name: QQAssist
version: 1.0.0
main: ru.allfire.qqassist.QQAssist
api-version: '1.21'
author: AllF1RE
description: Telegram Mini App with check-in, shop, reports, chat bot and admin tools

softdepend:
  - PlaceholderAPI
  - CMI
  - PlayerPoints
  - LuckPerms

commands:
  qqassist:
    aliases: [qq, qqa]
    permission: qqassist.use
  report:
    aliases: [rep, ticket]
    permission: qqassist.report
  checkin:
    aliases: [ci, daily]
    permission: qqassist.use
  qqpoints:
    aliases: [qqp, points]
    permission: qqassist.use
  qqshop:
    permission: qqassist.use
  qqlink:
    permission: qqassist.use
  qqunlink:
    permission: qqassist.use
  qqadmin:
    permission: qqassist.admin

permissions:
  qqassist.use:
    default: true
  qqassist.report:
    default: true
  qqassist.admin:
    default: op
  qqassist.admin.reports:
    default: op
  qqassist.admin.points:
    default: op
  qqassist.admin.punish:
    default: op
  qqassist.bypass.chat:
    default: op
  qqassist.bypass.checkin_cooldown:
    default: op
  qqassist.vip:
    default: false
