name: Build QQAssist

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check file structure
        run: |
          echo "=== Checking project structure ==="
          echo "Looking for QQAssist.java:"
          find . -name "QQAssist.java"
          echo ""
          echo "=== Full java source tree ==="
          find src -name "*.java" | sort
          echo ""
          echo "=== Looking for package declaration in QQAssist.java ==="
          find . -name "QQAssist.java" -exec head -1 {} \;
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        run: mvn clean package --batch-mode
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QQAssist
          path: target/QQAssist-*.jar
